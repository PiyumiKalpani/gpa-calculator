<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced GPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Advanced GPA Calculator</h1>
        <p>Enter your course marks and credits to calculate your GPA</p>

        <div id="courses">
            <div class="course">
                <input type="text" placeholder="Course Name">
                <input type="number" placeholder="Marks (0-100)">
                <input type="number" placeholder="Credits">
                <span class="grade"></span>
            </div>
        </div>

        <div class="buttons">
            <button class="add-btn" onclick="addCourse()">➕ Add Course</button>
            <button class="calc-btn" onclick="calculateGPA()">✅ Calculate GPA</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
        </div>

        <h2 id="result"></h2>
        <p id="total-credits"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
